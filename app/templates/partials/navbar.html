<nav class="
        fixed
        top-0
        left-0
        right-0
        z-50
        border-b
        border-slate-200
        bg-white/90
        backdrop-blur-xl
    ">

    <div class="
            max-w-7xl
            mx-auto
            px-6
            lg:px-8
        ">

        <div class="
                h-20
                flex
                items-center
                justify-between
            ">

            <!-- ======================================= -->
            <!-- LOGO -->
            <!-- ======================================= -->

            <a href="/"
                class="
                    flex
                    items-center
                    gap-4
                "
            >

                <!-- ICON -->
                <div class="
                        w-12
                        h-12
                        rounded-2xl
                        bg-red-700
                        flex
                        items-center
                        justify-center
                        shadow-lg
                    ">

                    <i
                        data-lucide="wifi"
                        class="w-6 h-6 text-white"
                    ></i>

                </div>

                <!-- TEXT -->
                <div>

                    <h1 class="
                            text-lg
                            font-black
                            tracking-tight
                            text-slate-950
                            leading-none
                        ">
                        JavaNet
                    </h1>

                    <p class="
                            text-xs
                            text-slate-500
                            mt-1
                        ">
                        Baraya Telematika Nusantara
                    </p>

                </div>

            </a>

            <!-- ======================================= -->
            <!-- MENU -->
            <!-- ======================================= -->

            <div class="
                    hidden
                    lg:flex
                    items-center
                    gap-10
                ">

                <a href="/"
                    class="
                        text-sm
                        font-semibold
                        text-slate-700
                        hover:text-red-700
                        transition-all
                    "
                >
                    Home
                </a>

                <a href="/#features"
                    class="
                        text-sm
                        font-semibold
                        text-slate-700
                        hover:text-red-700
                        transition-all
                    "
                >
                    Features
                </a>

                <a href="/#packages"
                    class="
                        text-sm
                        font-semibold
                        text-slate-700
                        hover:text-red-700
                        transition-all
                    "
                >
                    Packages
                </a>

                {% if current_user.is_authenticated %}

                    {% if current_user.is_admin %}

                    <a href="/admin"
                        class="
                            text-sm
                            font-semibold
                            text-slate-700
                            hover:text-red-700
                            transition-all
                        "
                    >
                        Admin Panel
                    </a>

                    {% else %}

                    <a href="/dashboard"
                        class="
                            text-sm
                            font-semibold
                            text-slate-700
                            hover:text-red-700
                            transition-all
                        "
                    >
                        Dashboard
                    </a>

                    {% endif %}

                {% endif %}

            </div>

            <!-- ======================================= -->
            <!-- ACTION -->
            <!-- ======================================= -->

            <div class="
                    hidden
                    lg:flex
                    items-center
                    gap-4
                ">

                {% if current_user.is_authenticated %}

                <a href="/logout"
                    class="
                        px-5
                        py-3
                        rounded-2xl
                        border
                        border-slate-300
                        text-slate-700
                        font-semibold
                        hover:border-red-700
                        hover:text-red-700
                        transition-all
                    "
                >
                    Logout
                </a>

                {% else %}

                <a href="/login"
                    class="
                        px-5
                        py-3
                        rounded-2xl
                        border
                        border-slate-300
                        text-slate-700
                        font-semibold
                        hover:border-red-700
                        hover:text-red-700
                        transition-all
                    "
                >
                    Login
                </a>

                <a href="/register"
                    class="
                        btn-primary
                        px-6
                        py-3
                        rounded-2xl
                        text-white
                        font-semibold
                        shadow-lg
                    "
                >
                    Get Started
                </a>

                {% endif %}

            </div>

            <!-- ======================================= -->
            <!-- MOBILE BUTTON -->
            <!-- ======================================= -->

            <button
                id="mobileMenuButton"
                class="
                    lg:hidden
                    w-12
                    h-12
                    rounded-2xl
                    bg-slate-100
                    flex
                    items-center
                    justify-center
                "
            >

                <i
                    data-lucide="menu"
                    class="w-6 h-6 text-slate-800"
                ></i>

            </button>

        </div>

    </div>

</nav>

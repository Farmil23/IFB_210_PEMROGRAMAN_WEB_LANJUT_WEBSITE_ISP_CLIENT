{% extends "base.html" %}

{% block content %}
<div style="display: flex; justify-content: center; margin-top: 50px;">
    <div class="card" style="width: 100%; max-width: 400px; padding: 30px;">
        <h2 style="margin-bottom: 20px;">Daftar Akun Baru</h2>
        <form method="POST" action="{{ url_for('register') }}">
            {% with messages = get_flashed_messages() %}
              {% if messages %}
                <div style="color: red; margin-bottom: 15px; font-size: 14px; text-align: center;">
                  {% for message in messages %}
                    {{ message }}
                  {% endfor %}
                </div>
              {% endif %}
            {% endwith %}
            <div style="margin-bottom: 15px; text-align: left;">
                <label style="display: block; margin-bottom: 5px;">Username</label>
                <input type="text" name="username" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px;" required>
            </div>
            <div style="margin-bottom: 15px; text-align: left;">
                <label style="display: block; margin-bottom: 5px;">Email</label>
                <input type="email" name="email" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px;" required>
            </div>
            <div style="margin-bottom: 20px; text-align: left;">
                <label style="display: block; margin-bottom: 5px;">Password</label>
                <input type="password" name="password" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px;" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Daftar</button>
        </form>
        <div style="margin-top: 15px; text-align: center; font-size: 14px;">
            Sudah punya akun? <a href="{{ url_for('login') }}">Masuk di sini</a>
        </div>
    </div>
</div>
{% endblock %}

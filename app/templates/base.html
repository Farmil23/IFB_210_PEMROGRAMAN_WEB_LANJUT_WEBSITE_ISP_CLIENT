<!DOCTYPE html>

<html lang="en">

<head>

```
<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
>

<title>
    {% block title %}
    BTN Net
    {% endblock %}
</title>

<!-- TAILWIND -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- AOS -->
<link
    href="https://unpkg.com/aos@2.3.4/dist/aos.css"
    rel="stylesheet"
>

<!-- FONT -->
<link
    rel="preconnect"
    href="https://fonts.googleapis.com"
>

<link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
>

<link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap"
    rel="stylesheet"
>

<!-- LUCIDE -->
<script src="https://unpkg.com/lucide@latest"></script>

<!-- CUSTOM -->
<style>

    *{
        font-family: 'Inter', sans-serif;
    }

    html{
        scroll-behavior:smooth;
    }

    body{
        background:#ffffff;
        color:#0f172a;
        overflow-x:hidden;
    }

    /* ================================= */
    /* SCROLLBAR */
    /* ================================= */

    ::-webkit-scrollbar{
        width:10px;
    }

    ::-webkit-scrollbar-track{
        background:#f1f5f9;
    }

    ::-webkit-scrollbar-thumb{
        background:#991b1b;
        border-radius:999px;
    }

    /* ================================= */
    /* GLASS */
    /* ================================= */

    .glass{
        background:rgba(255,255,255,0.7);
        backdrop-filter:blur(14px);
        -webkit-backdrop-filter:blur(14px);
        border:1px solid rgba(255,255,255,0.4);
    }

    /* ================================= */
    /* PREMIUM CARD */
    /* ================================= */

    .premium-card{
        background:#ffffff;
        border:1px solid #e2e8f0;
        box-shadow:
            0 10px 30px rgba(15,23,42,0.05);
        transition:all .35s ease;
    }

    .premium-card:hover{
        transform:translateY(-6px);
        box-shadow:
            0 25px 50px rgba(15,23,42,0.12);
        border-color:#fecaca;
    }

    /* ================================= */
    /* BUTTON PRIMARY */
    /* ================================= */

    .btn-primary{
        background:linear-gradient(
            to right,
            #991b1b,
            #dc2626
        );
        transition:all .3s ease;
        box-shadow:
            0 10px 25px rgba(220,38,38,0.25);
    }

    .btn-primary:hover{
        transform:translateY(-2px);
        box-shadow:
            0 18px 35px rgba(220,38,38,0.35);
    }

    /* ================================= */
    /* BUTTON SECONDARY */
    /* ================================= */

    .btn-secondary{
        background:#ffffff;
        border:1px solid #e2e8f0;
        transition:all .3s ease;
    }

    .btn-secondary:hover{
        background:#f8fafc;
        border-color:#fecaca;
    }

    /* ================================= */
    /* SHADOW */
    /* ================================= */

    .shadow-soft{
        box-shadow:
            0 10px 35px rgba(15,23,42,0.06);
    }

    .shadow-glow{
        box-shadow:
            0 15px 40px rgba(220,38,38,0.25);
    }

    /* ================================= */
    /* INPUT */
    /* ================================= */

    .input-modern{
        width:100%;
        padding:14px 18px;
        border-radius:18px;
        border:1px solid #e2e8f0;
        background:#ffffff;
        transition:.3s ease;
        outline:none;
    }

    .input-modern:focus{
        border-color:#dc2626;
        box-shadow:
            0 0 0 4px rgba(220,38,38,.12);
    }

    /* ================================= */
    /* TABLE */
    /* ================================= */

    .table-modern{
        width:100%;
        border-collapse:collapse;
    }

    .table-modern th{
        background:#f8fafc;
        padding:16px;
        text-align:left;
        font-size:14px;
        font-weight:700;
        color:#475569;
    }

    .table-modern td{
        padding:18px 16px;
        border-top:1px solid #e2e8f0;
    }

    .table-modern tr:hover{
        background:#fafafa;
    }

    /* ================================= */
    /* ANIMATION */
    /* ================================= */

    .hover-lift{
        transition:all .3s ease;
    }

    .hover-lift:hover{
        transform:translateY(-5px);
    }

</style>
```

</head>

<body>

```
<!-- NAVBAR -->
{% include 'partials/navbar.html' %}

<!-- CONTENT -->
<main>

    {% block content %}
    {% endblock %}

</main>

<!-- FOOTER -->
{% include 'partials/footer.html' %}

<!-- AOS -->
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<script>
    AOS.init({
        duration:1000,
        once:true
    });
</script>

<!-- LUCIDE -->
<script>
    lucide.createIcons();
</script>
```

</body>

</html>

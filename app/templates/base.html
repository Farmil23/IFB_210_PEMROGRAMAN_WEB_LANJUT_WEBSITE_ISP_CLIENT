<!DOCTYPE html>

<html lang="en">

<head>

```
<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
>

<title>
    {% block title %}
    JavaNet
    {% endblock %}
</title>

<!-- TAILWIND -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- AOS -->
<link
    href="https://unpkg.com/aos@2.3.4/dist/aos.css"
    rel="stylesheet"
>

<!-- FONT -->
<link
    rel="preconnect"
    href="https://fonts.googleapis.com"
>

<link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
>

<link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap"
    rel="stylesheet"
>

<!-- LUCIDE -->
<script src="https://unpkg.com/lucide@latest"></script>

<!-- CUSTOM -->
<style>

    html {
        scroll-behavior: smooth;
    }

    body{
        font-family: 'Inter', sans-serif;
        background:#f5f5f5;
        color:#111827;
        overflow-x:hidden;
    }

    /* ===================================== */
    /* TYPOGRAPHY */
    /* ===================================== */

    .heading-xl{
        font-size:clamp(3rem,7vw,6.5rem);
        line-height:0.95;
        font-weight:900;
        letter-spacing:-0.05em;
    }

    .heading-lg{
        font-size:clamp(2.5rem,5vw,4.5rem);
        line-height:1;
        font-weight:900;
        letter-spacing:-0.04em;
    }

    .section-label{
        font-size:0.8rem;
        font-weight:700;
        letter-spacing:0.25em;
        text-transform:uppercase;
        color:#b91c1c;
    }

    /* ===================================== */
    /* BUTTONS */
    /* ===================================== */

    .btn-primary{
        background:#b91c1c;
        color:white;
        transition:all .3s ease;
        position:relative;
        overflow:hidden;
    }

    .btn-primary:hover{
        background:#991b1b;
        transform:translateY(-3px);
        box-shadow:
            0 15px 40px rgba(185,28,28,.25);
    }

    .btn-secondary{
        background:white;
        border:1px solid #e5e7eb;
        transition:all .3s ease;
    }

    .btn-secondary:hover{
        border-color:#b91c1c;
        color:#b91c1c;
        transform:translateY(-2px);
    }

    /* ===================================== */
    /* CARDS */
    /* ===================================== */

    .premium-card{
        background:white;
        border:1px solid #e5e7eb;
        position:relative;
        transition:all .35s ease;
        overflow:hidden;
    }

    .premium-card::before{
        content:'';
        position:absolute;
        top:0;
        left:0;
        width:100%;
        height:4px;
        background:#b91c1c;
    }

    .premium-card:hover{
        transform:translateY(-8px);
        border-color:#fecaca;
        box-shadow:
            0 25px 50px rgba(0,0,0,.08);
    }

    /* ===================================== */
    /* DARK SECTION */
    /* ===================================== */

    .dark-section{
        background:
            linear-gradient(
                135deg,
                #0f0f10 0%,
                #161616 100%
            );
        color:white;
        position:relative;
        overflow:hidden;
    }

    .dark-section::before{
        content:'';
        position:absolute;
        inset:0;
        background-image:
            linear-gradient(
                rgba(255,255,255,.03) 1px,
                transparent 1px
            ),
            linear-gradient(
                90deg,
                rgba(255,255,255,.03) 1px,
                transparent 1px
            );
        background-size:40px 40px;
        opacity:.4;
    }

    /* ===================================== */
    /* CYBER LINES */
    /* ===================================== */

    .cyber-lines{
        position:absolute;
        inset:0;
        overflow:hidden;
        pointer-events:none;
    }

    .cyber-lines::before{
        content:'';
        position:absolute;
        width:120%;
        height:2px;
        background:
            linear-gradient(
                90deg,
                transparent,
                rgba(220,38,38,.8),
                transparent
            );

        top:20%;
        left:-10%;
        transform:rotate(-12deg);
    }

    .cyber-lines::after{
        content:'';
        position:absolute;
        width:120%;
        height:2px;
        background:
            linear-gradient(
                90deg,
                transparent,
                rgba(220,38,38,.5),
                transparent
            );

        bottom:20%;
        left:-10%;
        transform:rotate(8deg);
    }

    /* ===================================== */
    /* SHARP SHAPES */
    /* ===================================== */

    .sharp-shape{
        clip-path: polygon(
            10% 0,
            100% 0,
            90% 100%,
            0 100%
        );
    }

    /* ===================================== */
    /* NAVBAR */
    /* ===================================== */

    .navbar-blur{
        background:rgba(255,255,255,.9);
        backdrop-filter:blur(20px);
        border-bottom:1px solid rgba(0,0,0,.05);
    }

</style>
```

</head>

<body>

```
<!-- NAVBAR -->
{% include 'partials/navbar.html' %}

<!-- CONTENT -->
<main>

    {% block content %}
    {% endblock %}

</main>

<!-- FOOTER -->
{% include 'partials/footer.html' %}

<!-- AOS -->
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<script>
    AOS.init({
        duration:1000,
        once:true
    });
</script>

<!-- LUCIDE -->
<script>
    lucide.createIcons();
</script>
```

</body>

</html>

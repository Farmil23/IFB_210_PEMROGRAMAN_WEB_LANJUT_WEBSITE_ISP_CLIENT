{% extends "base_dashboard.html" %}

{% block content %}
<div class="flex min-h-screen bg-[#f4f5f7]">

    {% include 'partials/sidebar.html' %}

    <main class="flex-1">
        
        <header class="bg-white border-b border-gray-200 py-8 px-10">
            <p class="text-[11px] uppercase tracking-[0.3em] text-red-600 font-bold">User Settings</p>
            <h1 class="mt-2 text-4xl font-black text-black">Account <span class="text-red-600">Profile</span></h1>
            <p class="text-gray-500 mt-1">Manage your personal information and security settings.</p>
        </header>

        <div class="p-10">
            <div class="max-w-4xl bg-white rounded-3xl border border-gray-100 shadow-sm overflow-hidden">
                
                <div class="bg-red-600 h-32 relative">
                    <div class="absolute -bottom-12 left-10">
                        <div class="w-24 h-24 bg-white rounded-2xl shadow-md flex items-center justify-center text-4xl border-4 border-white">
                            👤
                        </div>
                    </div>
                </div>

                <div class="pt-16 pb-10 px-10">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        
                        <div>
                            <label class="text-[10px] uppercase font-bold text-gray-400 tracking-widest">Username</label>
                            <p class="text-xl font-black text-black mt-1">{{ current_user.username }}</p>
                        </div>

                        <div>
                            <label class="text-[10px] uppercase font-bold text-gray-400 tracking-widest">Email Address</label>
                            <p class="text-xl font-black text-black mt-1">{{ current_user.email }}</p>
                        </div>

                        <div>
                            <label class="text-[10px] uppercase font-bold text-gray-400 tracking-widest">Account Status</label>
                            <div class="mt-2">
                                <span class="bg-green-100 text-green-700 px-4 py-1 rounded-full font-bold text-xs">ACTIVE</span>
                            </div>
                        </div>

                        <div>
                            <label class="text-[10px] uppercase font-bold text-gray-400 tracking-widest">Member Since</label>
                            <p class="text-lg font-bold text-gray-700 mt-1">May 2026</p>
                        </div>

                    </div>

                    <div class="mt-10 pt-8 border-t border-gray-50 flex gap-4">
                        <button class="bg-black text-white px-8 py-3 rounded-xl font-bold hover:bg-gray-800 transition">
                            Edit Profile
                        </button>
                        <button class="border border-gray-200 text-gray-600 px-8 py-3 rounded-xl font-bold hover:bg-gray-50 transition">
                            Change Password
                        </button>
                    </div>
                </div>

            </div>
        </div>
    </main>

</div>
{% endblock %}

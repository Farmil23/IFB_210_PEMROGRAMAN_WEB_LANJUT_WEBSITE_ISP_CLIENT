{% extends "base_dashboard.html" %}

{% block content %}
<div class="min-h-screen bg-[#0b0f14] text-white px-6 lg:px-10 py-10">

    <div class="max-w-4xl mx-auto">

        <!-- HEADER -->
        <div class="mb-10">

            <a
                href="{{ url_for('account') }}"
                class="inline-flex items-center gap-2 text-slate-400 hover:text-white transition mb-5">

                <i data-lucide="arrow-left" class="w-4 h-4"></i>

                <span>Back to Account</span>

            </a>

            <p class="uppercase tracking-[0.28em] text-[11px] text-red-400 font-semibold">
                Profile Settings
            </p>

            <h1 class="mt-3 text-4xl font-black text-white">
                Edit Profile
            </h1>

            <p class="mt-3 text-slate-400">
                Update your personal information and profile photo.
            </p>

        </div>

        <!-- FORM -->
        <form
            method="POST"
            enctype="multipart/form-data"
            class="rounded-[32px] border border-white/10 bg-white/[0.03] backdrop-blur-xl p-8">

            <div class="flex flex-col lg:flex-row gap-10">

                <!-- PHOTO -->
                <div class="flex flex-col items-center">

                    <div class="relative group">

                        <div class="w-40 h-40 rounded-[30px] bg-gradient-to-br from-red-500 to-red-700 p-[3px] shadow-[0_0_35px_rgba(239,68,68,0.35)]">

                            <div class="w-full h-full rounded-[28px] bg-[#11151b] overflow-hidden flex items-center justify-center">

                                {% if current_user.profile_image %}

                                <img
                                    id="profilePreview"
                                    src="{{ url_for('static', filename=current_user.profile_image) }}"
                                    class="w-full h-full object-cover rounded-[28px]"
                                    alt="Profile">

                                {% else %}

                                <div
                                    id="profilePreview"
                                    class="w-full h-full flex items-center justify-center">

                                    <span class="text-5xl font-black text-white">
                                        {{ current_user.username[:2].upper() }}
                                    </span>

                                </div>

                                {% endif %}

                            </div>

                        </div>

                        <!-- CHANGE PHOTO -->
                        <label class="absolute inset-0 rounded-[30px] bg-black/60 opacity-0 group-hover:opacity-100 transition-all duration-300 flex flex-col items-center justify-center cursor-pointer">

                            <i data-lucide="camera" class="w-6 h-6 text-white mb-2"></i>

                            <span class="text-sm font-semibold text-white">
                                Change Photo
                            </span>

                            <input
                                type="file"
                                name="profile_image"
                                id="profileImageInput"
                                class="hidden"
                                accept="image/*">

                        </label>

                    </div>

                </div>

                <!-- RIGHT -->
                <div class="flex-1">

                    <!-- USERNAME -->
                    <div class="mb-6">

                        <label class="block text-sm font-semibold text-slate-300 mb-3">
                            Username
                        </label>

                        <input
                            type="text"
                            name="username"
                            value="{{ current_user.username }}"
                            class="w-full rounded-2xl border border-white/10 bg-[#11151b] px-5 py-4 text-white outline-none focus:border-red-500 focus:ring-4 focus:ring-red-500/10">

                    </div>

                    <!-- EMAIL -->
                    <div class="mb-8">

                        <label class="block text-sm font-semibold text-slate-300 mb-3">
                            Email Address
                        </label>

                        <input
                            type="email"
                            name="email"
                            value="{{ current_user.email }}"
                            class="w-full rounded-2xl border border-white/10 bg-[#11151b] px-5 py-4 text-white outline-none focus:border-red-500 focus:ring-4 focus:ring-red-500/10">

                    </div>

                    <!-- BUTTON -->
                    <button
                        type="submit"
                        class="inline-flex items-center gap-3 rounded-2xl bg-red-500 px-8 py-4 font-semibold text-white transition-all duration-300 hover:bg-red-400 hover:shadow-[0_0_35px_rgba(239,68,68,0.35)]">

                        <i data-lucide="save" class="w-5 h-5"></i>

                        <span>Save Changes</span>

                    </button>

                </div>

            </div>

        </form>

    </div>

</div>

<script>

const profileInput = document.getElementById('profileImageInput');
const profilePreview = document.getElementById('profilePreview');

if(profileInput){

    profileInput.addEventListener('change', function(e){

        const file = e.target.files[0];

        if(file){

            const reader = new FileReader();

            reader.onload = function(event){

                if(profilePreview.tagName === 'IMG'){

                    profilePreview.src = event.target.result;

                } else {

                    profilePreview.innerHTML = `
                        <img
                            src="${event.target.result}"
                            class="w-full h-full object-cover rounded-[28px]"
                        >
                    `;

                }

            }

            reader.readAsDataURL(file);

        }

    });

}

</script>

{% endblock %}

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        {% block title %}{% endblock %}
    </title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://unpkg.com/lucide@latest"></script>

</head>

<body class="bg-[#f4f5f7]">

    {% if presentation_mode %}
    <div class="bg-amber-500 text-amber-950 text-center text-xs sm:text-sm font-semibold py-2 px-3">
        Mode presentasi / demo aktif (<code class="font-mono">PRODUCTION=false</code>) — voucher bisa di-checkout tanpa router di database.
    </div>
    {% endif %}

    {% block content %}{% endblock %}

    <script>
        lucide.createIcons();
    </script>

</body>

</html>
